            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    callback(compressedBase64);
                };
            };
        };

                                    </div>
                                </div>

                                <form onSubmit={handleAddExpense} className="space-y-3">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-[11px] font-black text-[#183684]/70 mb-1 uppercase">SPENT AMOUNT (€)</label>
                                            <input
                                                type="number"
                                                step="any"
                                                placeholder="예: 25.50"
                                                required
                                                value={newExpense.amountEur}
                                                onChange={(e) => setNewExpense({...newExpense, amountEur: e.target.value})}
                                                className="w-full text-xs p-2.5 border-2 border-[#183684] rounded-xl focus:outline-none font-bold"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-[11px] font-black text-[#183684]/70 mb-1 uppercase">CATEGORY</label>
                                            <select
                                                value={newExpense.category}
                                                onChange={(e) => setNewExpense({...newExpense, category: e.target.value})}
                                                className="w-full text-xs p-2.5 border-2 border-[#183684] rounded-xl bg-white font-black"
                                            >
                                                {["식비", "교통비", "쇼핑", "입장료", "기타"].map(cat => (
                                                    <option key={cat} value={cat}>{cat}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>
                                    <input
                                        type="text"
                                        placeholder="상세 내역 (예: 고흐 미술관 해바라기 케익 🌻)"
                                        value={newExpense.desc}
                                        onChange={(e) => setNewExpense({...newExpense, desc: e.target.value})}
                                        className="w-full text-xs p-2.5 border-2 border-[#183684] rounded-xl focus:outline-none font-bold"
                                    />
                                    <button
                                        type="submit"
                                        className="w-full py-2 bg-[#183684] hover:bg-[#E32C22] text-white border-2 border-white font-black rounded-xl text-xs shadow-[2px_2px_0_0_#183684] transition-all"
                                    >
                                        경비 등록하기 ➕
                                    </button>
                                </form>

                                {/* Category summary statistics with custom progress bars */}
                                <div className="border-t-3 border-dashed border-[#183684]/30 pt-4 space-y-2.5">
                                    <h4 className="font-black text-xs text-[#183684] uppercase">
                                        📊 {ledgerFilter === "오늘" ? `Day 0${selectedDay} 카테고리별 지출 통계` : "여행 전체 누적 지출 통계"}
                                    </h4>
                                    <div className="space-y-1.5">
                                        {getCategorySum(selectedDay, ledgerFilter === "전체").map((item) => {
                                            const totalOfFilter = ledgerFilter === "오늘" ? currentDayExpenseSum : totalExpenseSumEur;
                                            const pct = totalOfFilter > 0 ? (item.value / totalOfFilter) * 100 : 0;
                                            return (
                                                <div key={item.category} className="text-xs">
                                                    <div className="flex justify-between font-bold text-[#183684] mb-0.5">
                                                        <span>{item.category}</span>
                                                        <span>€ {item.value.toFixed(2)} ({(Math.round(item.value * exchangeRate)).toLocaleString()}원)</span>
                                                    </div>
                                                    <div className="w-full bg-stone-100 rounded-full h-2.5 border border-[#183684]/30 overflow-hidden">
                                                        <div 
                                                            className="bg-[#E32C22] h-full rounded-full transition-all duration-300"
                                                            style={{ width: `${pct}%`, backgroundColor: item.category === "식비" ? '#E32C22' : item.category === "교통비" ? '#009E49' : item.category === "쇼핑" ? '#FFD100' : '#183684' }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="space-y-2 border-t-3 border-dashed border-[#183684]/30 pt-4 text-xs">
                                    <div className="flex justify-between items-center text-[#183684]">
                                        <span className="font-bold">오늘 ({selectedDay}일차) 합산:</span>
                                        <span className="font-black text-[#E32C22] text-sm">
                                            € {currentDayExpenseSum.toFixed(2)} 
                                            <span className="text-[11px] text-[#183684]/60 ml-1.5">
                                                ({(Math.round(currentDayExpenseSum * exchangeRate)).toLocaleString()}원)
                                            </span>
                                        </span>
                                    </div>
                                    <div className="flex justify-between items-center text-white bg-[#183684] p-3 rounded-xl border-2 border-[#183684]">
                                        <span className="font-black">✈️ 여행 총 누적 경비:</span>
                                        <span className="font-black text-right">
                                            € {totalExpenseSumEur.toFixed(2)}
                                            <span className="text-[10px] block text-amber-200 font-bold mt-0.5">
                                                ({(Math.round(totalExpenseSumEur * exchangeRate)).toLocaleString()}원)
                                            </span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* PRE-CHECKLIST PREPARATION ITEMS */}
                        <div className="retro-window">
                            <div className="bg-[#183684] text-white px-3 py-2 flex items-center justify-between">
                                <span className="font-black text-xs">📋 TASK_CHECKLIST.EXE</span>
                                <span className="w-3.5 h-3.5 rounded-full bg-[#009E49] border-2 border-white"></span>
                            </div>

                            <div className="p-5 bg-[#FFFDF9]">
                                <div className="space-y-2 max-h-[220px] overflow-y-auto pr-2">
                                    {checklist.map(item => (
                                        <label
                                            key={item.id}
                                            className={`flex items-start gap-3 p-2 rounded-xl transition-colors border-2 cursor-pointer ${
                                                item.checked 
                                                    ? "text-stone-400 bg-stone-50 border-transparent line-through" 
                                                    : "bg-white border-[#183684] hover:bg-[#FFEBEB]"
                                            }`}
                                        >
                                            <input
                                                type="checkbox"
                                                checked={item.checked}
                                                onChange={() => toggleChecklist(item.id)}
                                                className="mt-1 rounded border-2 border-[#183684] text-[#183684] focus:ring-[#183684] w-4.5 h-4.5 flex-shrink-0"
                                            />
                                            <div className="flex-grow">
                                                <span className="font-black leading-tight text-xs md:text-sm text-[#183684]">{item.text}</span>
                                                {item.required && (
                                                    <span className="ml-1.5 text-[9px] bg-[#FFEBEB] text-[#E32C22] px-2 py-0.5 rounded-full font-black border-2 border-[#E32C22]">
                                                        필수
                                                    </span>
                                                )}
                                            </div>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        </div>

                    </div>

                </main>

                {/* APP FOOTER */}
                <footer className="bg-stone-900 text-stone-400 text-center py-8 border-t-8 border-[#183684] text-xs font-bold mt-12">
                    <p className="font-serif-fancy italic text-stone-200 mb-2">Bon Voyage with MOM 🌸</p>
                    <p className="max-w-xl mx-auto px-4">
                        © 2026 베테랑 여행 플래너 헌정 미피 스페셜 에디션 다이어리 앱 <br /> 
                        급하게 네덜란드-하면된다 with MOM
                    </p>
                </footer>

                {/* RETRO PHOTO EDIT LIGHTBOX */}
                {activeLightboxItem && (
                    <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-xs flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl p-5 max-w-lg w-full border-4 border-[#183684] shadow-2xl flex flex-col gap-4 relative">
                            
                            <div className="flex items-center justify-between border-b-2 border-dashed border-[#183684]/30 pb-2">
                                <h3 className="font-black text-sm text-[#183684] flex items-center gap-1.5">
                                    <span>🐰</span> PHOTO_MEMO_EDITOR.EXE
                                </h3>
                                <button 
                                    onClick={() => setActiveLightboxItem(null)}
                                    className="bg-[#FFEBEB] hover:bg-stone-100 text-[#183684] border-2 border-[#183684] font-bold px-3 py-1 rounded-xl text-xs active:translate-y-0.5"
                                >
                                    ✕
                                </button>
                            </div>

                            <div className="bg-stone-950 rounded-2xl overflow-hidden flex items-center justify-center max-h-[280px] border-3 border-[#183684]">
                                {activeLightboxItem.photo.type === 'video' ? (
                                    <video src={activeLightboxItem.photo.url} controls className="max-w-full max-h-[280px] object-contain" />
                                ) : (
                                    <img src={activeLightboxItem.photo.url} alt="Detail view" className="max-w-full max-h-[280px] object-contain" />
                                )}
                            </div>

                            <div>
                                <label className="block text-[11px] font-black text-[#183684]/70 mb-1 uppercase">✍️ 마음을 남기는 감성 손글씨 편지 한줄</label>
                                <input 
                                    type="text"
                                    value={activeLightboxItem.photo.caption}
                                    onChange={(e) => updateLightboxCaption(e.target.value)}
                                    placeholder="어머니와 보낸 가슴 따뜻한 마음 한줄을 적어보세요..."
                                    className="w-full text-center text-2xl font-handwritten font-black text-[#183684] bg-[#FFFCE8] border-b-3 border-dashed border-[#183684] rounded-lg focus:outline-none py-2 px-3"
                                />
                            </div>

                            <div className="flex gap-2 pt-2 border-t-2 border-dashed border-[#183684]/30">
                                <button 
                                    onClick={() => downloadPhoto(activeLightboxItem.photo)}
                                    className="flex-1 bg-[#183684] hover:bg-[#E32C22] text-white border-2 border-white font-black py-2.5 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 shadow-[2px_2px_0_0_#183684]"
                                >
                                    📥 기기에 사진 저장
                                </button>
                                <button 
                                    onClick={() => downloadPhoto(activeLightboxItem.photo)}
                                    className="flex-1 bg-[#183684] hover:bg-[#E32C22] text-white border-2 border-white font-black py-2.5 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 shadow-[2px_2px_0_0_#183684]"
                                >
                                    📥 기기에 사진 저장
                                </button>
                                <button 
                                    onClick={deletePhotoFromLightbox}
                                    className="bg-[#FFEBEB] hover:bg-[#E32C22] hover:text-white text-[#183684] font-black py-2.5 px-4 rounded-xl text-xs border-2 border-[#183684]"
                                >
                                    🗑️ 삭제
                                </button>
                            </div>

                        </div>
                    </div>
                )}

                {/* CUSTOM DIALOG POPUP */}
                {customAlert && (
                    <div className="fixed inset-0 z-[60] bg-black/60 backdrop-blur-xs flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl p-6 max-w-xs w-full border-4 border-[#E32C22] shadow-[6px_6px_0_0_#183684] text-center flex flex-col items-center gap-4">
                            <MiffyLogo className="w-16 h-18 animate-pulse" />
                            <h4 className="font-black text-base text-[#E32C22] tracking-wider">Miffy Alerts</h4>
                            <p className="text-[#183684] font-bold text-sm leading-relaxed">{customAlert}</p>
                            <button 
                                onClick={() => setCustomAlert(null)}
                                className="bg-[#183684] hover:bg-[#E32C22] text-white border-2 border-white font-black px-6 py-2.5 rounded-xl text-xs shadow-[3px_3px_0_0_#183684] w-full"
                            >
                                확인했습니다 🐰
                            </button>
                        </div>
                    </div>
                )}

            </div>
        );
    }

    window.onload = function() {
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    };
</script>

</body>
</html>
