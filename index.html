            text,
            x: 10 + Math.random() * 50,
            y: 10 + Math.random() * 50,
            rotate: -15 + Math.random() * 30

    const handleDragStart = (e, id) => {
        e.stopPropagation();
        setActiveDragId(id);
        const rect = e.currentTarget.parentElement.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        setDragOffset({
            x: ((clientX - rect.left) / rect.width) * 100,
            y: ((clientY - rect.top) / rect.height) * 100
        });
    };

    const handleDragMove = (e) => {
        if (!activeDragId) return;
        const canvas = document.getElementById("diary-canvas");
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const posX = ((clientX - rect.left) / rect.width) * 100;
        const posY = ((clientY - rect.top) / rect.height) * 100;

        setStickers(prev => prev.map(st => st.id === activeDragId ? {
            ...st,
            x: Math.max(0, Math.min(90, posX)),
            y: Math.max(0, Math.min(95, posY))
        } : st));
    };

        setActiveDragId(null);

    const deleteSticker = (id) => {

    const handlePhotoUpload = (e) => {
        const files = e.target.files;
        if (!files || files.length === 0) return;

        const dayPhotos = photos[currentDay] || [];
        if (dayPhotos.length + files.length > 6) {
            triggerAlert("⚠️ 하루에 최대 6장의 사진까지만 보관할 수 있습니다!");
            return;
        }

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    let width = img.width;
                    let height = img.height;
                    const max_size = 800;

                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);
                    const compressedDataUrl = canvas.toDataURL("image/jpeg", 0.65);

                    setPhotos(prev => {
                        const updatedDayList = [...(prev[currentDay] || []), {

                        }];
                        return { ...prev, [currentDay]: updatedDayList };
                    });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    };

            {page === "diary" && (

                    {/* TWO SECTION SPLIT: SIDEBAR(20%) VS CONTENT(80%) */}

                        {/* LEFT SIDEBAR (20% Span) */}

                                    onChange={(e) => {
                                        setLightbox(prev => ({ ...prev, caption: e.target.value }));
                                        updatePhotoCaption(lightbox.day, lightbox.index, e.target.value);
                                    }}
                                    className="w-full p-2 border-2 border-[#183684] rounded-lg font-bold text-[#183684] text-center bg-amber-50/50"
                                    placeholder="사진에 대한 예쁜 설명을 적어주세요."
                                />
                            </div>

                            <div className="flex gap-2 justify-center">
                                <button
                                    onClick={() => handleDownloadPhoto(lightbox.imgUrl, `Miffy_Trip_Day${lightbox.day}_Photo${lightbox.index + 1}.jpg`)}
                                    className="retro-btn bg-[#FFD100] text-[#183684] px-4 py-2 font-bold text-sm"
                                >
                                    📥 기기에 저장하기
                                </button>
                                <button
                                    onClick={() => removePhoto(lightbox.day, lightbox.index)}
                                    className="retro-btn bg-[#E51B23] text-white px-4 py-2 font-bold text-sm"
                                >
                                    🗑️ 이 사진 삭제
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* ENTIRE PHOTO GALLERY MODAL */}
            {albumOpen && (
                <div className="fixed inset-0 bg-black/75 flex items-center justify-center z-[900] p-4">
                    <div className="bg-[#FDFBF7] border-[4px] border-[#183684] rounded-2xl max-w-4xl w-full p-6 relative shadow-2xl max-h-[85vh] overflow-y-auto">
                        <div className="flex justify-between items-center border-b-4 border-[#183684] pb-3 mb-6">
                            <h2 className="text-3xl font-black text-[#183684] flex items-center gap-2">📖 모녀여행 전체 추억 앨범 감상</h2>
                            <button
                                onClick={() => setAlbumOpen(false)}
                                className="retro-btn bg-[#E51B23] text-white px-4 py-1 text-sm font-bold"
                            >
                                닫기 X
                            </button>
                        </div>

                        <div className="space-y-6">
                            {Array.from({ length: 9 }).map((_, idx) => {
                                const d = idx + 1;
                                const dPhotos = photos[d] || [];
                                return (
                                    <div key={d} className="border-2 border-dashed border-[#183684]/40 p-4 rounded-xl bg-white">
                                        <h3 className="font-black text-xl text-[#E51B23] mb-3">📂 Day 0{d} 추억</h3>
                                        {dPhotos.length === 0 ? (
                                            <p className="text-sm text-gray-400 italic">아직 업로드된 사진이 없습니다.</p>
                                        ) : (
                                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                                {dPhotos.map((photo, pIdx) => (
                                                    <div
                                                        key={photo.id}
                                                        onClick={() => {
                                                            setLightbox({ show: true, imgUrl: photo.url, day: d, index: pIdx, caption: photo.caption });
                                                            setAlbumOpen(false);
                                                        }}
                                                        className="cursor-pointer border-2 border-[#183684] bg-white p-2 rounded shadow-sm hover:scale-[1.03] transition-transform text-center"
                                                    >
                                                        <img src={photo.url} className="w-full h-[120px] object-cover rounded border" />
                                                        <p className="text-xs font-bold text-[#183684] mt-2 truncate">{photo.caption}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
